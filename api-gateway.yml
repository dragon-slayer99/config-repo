spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true

          routes:
          - id: order
            uri:
              lb://order-service:8084
            predicates:
            - Path=/api/orders/**
            filters:
            - StripPrefix=1

          - id: cart
            uri:
              lb://cart-service:8083
            predicates:
            - Path=/api/cart/items/**
            filters:
            - StripPrefix=1
          
          - id: user
            uri:
              lb://user-service:8082
            predicates:
            - Path=/api/users/**, /api/admin/**
            filters:
            - StripPrefix=1

          - id: product
            uri:
              lb://product-service:8081
            predicates:
            - Path=/api/products/**
            filters:
            - StripPrefix=1
          - id: openapi
            uri: 
              http://localhost:8080
            predicates:
            - Path=/v3/api-docs/**
            filters:
            - RewritePath=/v3/api-docs/(?<path>.*), /$\{path}/v3/api-docs

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    use-root-path: true

server:
  port: 8080