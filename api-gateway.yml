spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
          - id: cart
            uri:
              http://localhost:8083
            predicates:
            - Path=/api/cart/**
            filters:
            - StripPrefix=1
          
          - id: user
            uri:
              http://localhost:8082
            predicates:
            - Path=/api/user/**
            filters:
            - StripPrefix=1

          - id: product
            uri:
              http://localhost:8081
            predicates:
            - Path=/api/products/**
            filters:
            - StripPrefix=1

server:
  port: 8080