spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
      routes:
        - id: cart
          uri: lb://cart-service
          predicates:
            - Path=/api/cart,/api/cart/**
          filters:
            - StripPrefix=1

        - id: user
          uri: lb://user-service
          predicates:
              - Path=/api/user,/api/user/**
          filters:
              - StripPrefix=1


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

server:
  port: 8080