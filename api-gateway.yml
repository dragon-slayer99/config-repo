spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
          routes:
          - id: order
            uri:
              http://localhost:8084
            predicates:
            - Path=/api/orders/**
            filters:
            - StripPrefix=1

          - id: cart
            uri:
              http://localhost:8083
            predicates:
            - Path=/api/cart/items/**
            filters:
            - StripPrefix=1
          
          - id: user
            uri:
              http://localhost:8082
            predicates:
            - Path=/api/users/**,/api/admin/**
            filters:
            - StripPrefix=1

          - id: product
            uri:
              http://localhost:8081
            predicates:
            - Path=/api/products/**
            filters:
            - StripPrefix=1

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
  instance:
    prefer-ip-address: true

server:
  port: 8080